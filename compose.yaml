# Single-container deployment for the RSS reader.
#
#   cp .env.example .env   # then fill in RAILS_MASTER_KEY
#   docker compose up -d --build
#
# Point Nginx Proxy Manager at http://<host>:3000 (it terminates TLS and sets
# X-Forwarded-Proto, so the app's force_ssl/HSTS work). Access is gated by
# Twingate at the network layer, so no in-app login is configured.
services:
  web:
    build: .
    image: rss:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Decrypts config/credentials.yml.enc — required. Set in .env.
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:?set RAILS_MASTER_KEY in .env}
      # Run the Solid Queue worker inside Puma so feed refresh / pruning /
      # thumbnail jobs actually run in this single container.
      SOLID_QUEUE_IN_PUMA: "true"
      # Optional HTTP Basic auth for the /jobs dashboard. Left unset it fails
      # closed (401), so the dashboard is never exposed by accident.
      MISSION_CONTROL_JOBS_HTTP_BASIC_AUTH_USER: ${MISSION_CONTROL_JOBS_HTTP_BASIC_AUTH_USER:-}
      MISSION_CONTROL_JOBS_HTTP_BASIC_AUTH_PASSWORD: ${MISSION_CONTROL_JOBS_HTTP_BASIC_AUTH_PASSWORD:-}
    volumes:
      # Persist all SQLite databases (primary holds feeds + read/starred state;
      # cache/queue are regenerable). Back up this volume.
      - rss_storage:/rails/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  rss_storage:
