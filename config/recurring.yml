# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

default: &default
  # Check every 5 minutes and refresh any feeds past their update frequency.
  refresh_outdated_feeds:
    class: RefreshOutdatedFeedsJob
    schedule: "*/5 * * * *"
  # Prune old posts daily (no-op unless PRUNE_POSTS_AFTER_DAYS is set).
  prune_old_posts:
    class: PrunePostsJob
    schedule: "0 4 * * *"

development:
  <<: *default

production:
  <<: *default
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
